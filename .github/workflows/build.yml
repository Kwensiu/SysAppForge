name: Build Debug APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --no-configuration-cache

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SysAppForge-debug-v0.1.0
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
